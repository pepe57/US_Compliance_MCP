name: Check Regulation Updates

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM EST, 10 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check for regulation updates
        id: check_updates
        run: |
          echo "Checking eCFR.gov for updates..."
          npm run check-updates 2>&1 | tee update-check.log

          # Check if updates were found (script exits with code 1 if updates found)
          if [ "${PIPESTATUS[0]}" -eq 1 ]; then
            echo "updates_found=true" >> "$GITHUB_OUTPUT"
            echo "Update check found changes - will create issue"
          else
            echo "updates_found=false" >> "$GITHUB_OUTPUT"
            echo "No updates found"
          fi
        continue-on-error: true

      - name: Configure git
        if: steps.check_updates.outputs.updates_found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create update branch
        if: steps.check_updates.outputs.updates_found == 'true'
        id: create_branch
        run: |
          BRANCH_NAME="auto-update/$(date +%Y-%m-%d)"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH_NAME"
          echo "Created branch: $BRANCH_NAME"

      - name: Re-ingest changed regulations
        if: steps.check_updates.outputs.updates_found == 'true'
        run: |
          echo "Re-ingesting regulations from sources..."
          npm run ingest
        continue-on-error: false

      - name: Rebuild database
        if: steps.check_updates.outputs.updates_found == 'true'
        run: |
          echo "Rebuilding database with updated data..."
          npm run build:db
        continue-on-error: false

      - name: Run tests
        if: steps.check_updates.outputs.updates_found == 'true'
        run: |
          echo "Running tests to verify data integrity..."
          npm test
        continue-on-error: false

      - name: Commit changes
        if: steps.check_updates.outputs.updates_found == 'true'
        run: |
          git add data/
          git add data/regulations.db
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_ENV"
          else
            git commit -m "chore: auto-update regulations from official sources

          - Re-ingested changed regulations
          - Rebuilt database with latest data
          - All tests passed

          Generated by regulation-update-checker workflow
          Date: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            echo "has_changes=true" >> "$GITHUB_ENV"
          fi

      - name: Push branch
        if: steps.check_updates.outputs.updates_found == 'true' && env.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ steps.create_branch.outputs.branch_name }}
        run: |
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.check_updates.outputs.updates_found == 'true' && env.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.create_branch.outputs.branch_name }}
        with:
          script: |
            const fs = require('fs');
            const logContent = fs.readFileSync('update-check.log', 'utf8');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Auto-update: Regulation changes detected',
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `## Automated Regulation Update

              This PR was automatically created by the regulation-update-checker workflow.

              ### Changes Detected:
              \`\`\`
              ${logContent}
              \`\`\`

              ### Actions Taken:
              - ✅ Re-ingested changed regulations from official sources
              - ✅ Rebuilt database with updated data
              - ✅ All tests passed

              ### Sources Checked:
              - eCFR.gov (HIPAA, GLBA, FERPA, COPPA, FDA, EPA)
              - California LegInfo (CCPA)
              - State legislature sites (VA, CO, CT, UT)

              ### Review Checklist:
              - [ ] Review regulation changes in the update log above
              - [ ] Verify database integrity
              - [ ] Check for any breaking changes
              - [ ] Update version number if releasing (patch for updates)
              - [ ] Merge when ready

              ---
              🤖 Generated by regulation-update-checker workflow at ${new Date().toISOString()}`
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);

            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['automated', 'regulation-update', 'dependencies']
            });

      - name: Create GitHub Issue if PR creation fails
        if: failure() && steps.check_updates.outputs.updates_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logContent = fs.readFileSync('update-check.log', 'utf8');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔔 Regulation Updates Detected (Manual Review Required)',
              body: `## Automated Update Check

              The daily regulation update check has detected changes in one or more data sources.

              **⚠️ Automatic PR creation failed. Manual intervention required.**

              ### Check Results:
              \`\`\`
              ${logContent}
              \`\`\`

              ### Next Steps:
              1. Review the changes listed above
              2. Run \`npm run ingest\` to fetch updated regulation data
              3. Run \`npm run build:db\` to rebuild the database
              4. Run \`npm test\` to verify data integrity
              5. Create a PR with the changes
              6. Update version number if releasing

              ### Sources Monitored:
              - eCFR.gov (HIPAA, GLBA, FERPA, COPPA, FDA, EPA)
              - California LegInfo (CCPA)
              - State legislature sites (VA, CO, CT, UT)

              **This is an automated notification.** Close this issue once you've reviewed and handled the updates.

              ---
              🤖 Generated by regulation-update-checker workflow`,
              labels: ['automated', 'regulation-update', 'needs-review', 'manual-intervention']
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: Upload check log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-check-log
          path: update-check.log
          retention-days: 30
