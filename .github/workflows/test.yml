name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true # Only block on high/critical vulnerabilities

      - name: Build TypeScript
        run: npm run build

      - name: Build database
        run: npm run build:db

      - name: Run tests
        run: npm test

      - name: Run golden contract tests
        run: npx vitest run tests/golden.test.ts

      - name: Test Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            echo "## ✅ Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "All tests passed successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "Tests failed - check workflow logs" >> "$GITHUB_STEP_SUMMARY"
          fi
